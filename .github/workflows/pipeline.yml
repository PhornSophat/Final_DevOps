name: CI/CD Pipeline

on: [push]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and Test
        run: |
          ./mvnw clean package
          ./mvnw test -Dspring.profiles.active=test

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Ansible Playbook
        uses: dawidd6/action-ansible-playbook@v2
        with:
          playbook: deploy.yml
          inventory: hosts
          key: ${{ secrets.SSH_PRIVATE_KEY }}name: CI/CD Pipeline

on: [push]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and Test
        run: |
          ./mvnw clean package
          ./mvnw test -Dspring.profiles.active=test

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Ansible Playbook
        uses: dawidd6/action-ansible-playbook@v2
        with:
          playbook: deploy.yml
          inventory: hosts
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: unnecessary # Set to a specific key if you need strict security

  notify-failure:
    needs: [build-and-test, deploy]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send email on failure
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIl_PASSWORD }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Build Failed: ${{ github.job }} in ${{ github.repository }}"
          to: srengty@gmail.com, ${{ github.event.pusher.email }}
          body: "Build failed for commit ${{ github.sha }}. Check logs at ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          known_hosts: unnecessary # Set to a specific key if you need strict security

  notify-failure:
    needs: [build-and-test, deploy]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send email on failure
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIl_PASSWORD }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Build Failed: ${{ github.job }} in ${{ github.repository }}"
          to: srengty@gmail.com, ${{ github.event.pusher.email }}
          body: "Build failed for commit ${{ github.sha }}. Check logs at ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"