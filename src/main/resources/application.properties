spring.application.name=demo

# MySQL Connection Configuration
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/id_card_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:Hello@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB
app.storage.photo-dir=${PHOTO_UPLOAD_DIR:uploads/photos}
app.verification-base-url=${VERIFICATION_BASE_URL:http://localhost:8080/verify}
