apiVersion: v1
kind: Pod
metadata:
  name: spring-web-db-pod
  labels:
    app: spring-app
spec:
  containers:
  - name: web-server
    # Ensure this image has the necessary tools (PHP, Nginx, JDK 21)
    image: php:8.2-fpm-alpine 
    command: ["/bin/sh", "-c", "apk add --no-cache openjdk21 nginx && while true; do sleep 3600; done"]
    ports:
    - containerPort: 8080
    - containerPort: 8443
    - containerPort: 2222
  - name: mysql-db
    image: mysql:8.0
    env:
    - name: MYSQL_ROOT_PASSWORD
      value: "Hello@123"
    - name: MYSQL_DATABASE
      value: "B-PHORN_Sophath-db"
    ports:
    - containerPort: 3306